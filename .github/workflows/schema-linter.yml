name: Enforce Schema & Translations

on:
  pull_request:
    branches:
      - main
      - development

jobs:
  lint-schema-labels:
    name: Prevent Hardcoded Labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for Hardcoded Strings
        run: |
          if grep -rnP '"(name|label|info|placeholder|content)"\s*:\s*"(?!t:)[^"]+"' sections/ blocks/ 2>/dev/null; then
            echo "🚨 ERROR: Hardcoded schema strings detected!"
            exit 1
          fi

  theme-check:
    name: Verify All Locale Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shopify Theme Check
        uses: shopify/theme-check-action@v2
        with:
          # This automatically scans all locales to ensure no keys are missing!
          token: ${{ github.token }}